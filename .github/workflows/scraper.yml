name: Actualizar datos legislativos

on:
  schedule:
    # 4:00 AM hora Panamá = 9:00 AM UTC (Panamá es UTC-5)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar navegador Chromium
        run: playwright install chromium --with-deps

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Commit y push de datos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos.json diputados.json resumen.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "datos: actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
